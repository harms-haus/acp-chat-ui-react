<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

        var data = {"files":[{"path":["/","home","blake","Documents","software","acp-react-chat-ui","crates","acp-ws-bridge","src","contract","envelope.rs"],"content":"//! Versioned WebSocket envelope for all bridge-to-browser messages.\n\nuse serde::{Deserialize, Serialize};\nuse ts_rs::TS;\n\nuse super::{ENVELOPE_VERSION, SUPPORTED_VERSIONS};\nuse crate::contract::BridgeMessage;\n\n/// Versioned WebSocket envelope for all bridge-to-browser messages.\n///\n/// This is the single source of truth for the wire format. The bridge never\n/// mutates ACP payload contents — it only wraps them in this envelope.\n#[derive(Debug, Clone, Serialize, Deserialize, TS)]\n#[ts(export)]\npub struct BridgeEnvelope {\n    /// Envelope format version. Must be one of SUPPORTED_VERSIONS.\n    pub version: u32,\n\n    /// Sequence number for ordering messages in replay mode.\n    /// Zero in live mode; monotonically increasing in replay mode.\n    #[ts(type = \"number\")]\n    pub seq: u64,\n\n    /// Unix timestamp in milliseconds when the envelope was created.\n    #[ts(type = \"number\")]\n    pub timestamp_ms: u64,\n\n    /// Optional free-form metadata. The ws-bridge treats this as opaque JSON.\n    /// Specific interpretations (e.g., replay-speed) happen at the harness-server layer.\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub extra_data: Option\u003cserde_json::Value\u003e,\n\n    /// The message payload.\n    #[serde(flatten)]\n    pub message: BridgeMessage,\n}\n\nimpl BridgeEnvelope {\n    /// Creates a new envelope with the current version and a live-mode seq of 0.\n    pub fn new(message: BridgeMessage, timestamp_ms: u64) -\u003e Self {\n        Self {\n            version: ENVELOPE_VERSION,\n            seq: 0,\n            timestamp_ms,\n            extra_data: None,\n            message,\n        }\n    }\n\n    /// Creates a new envelope for replay mode with a specific sequence number.\n    pub fn new_replay(\n        message: BridgeMessage,\n        timestamp_ms: u64,\n        seq: u64,\n        extra_data: Option\u003cserde_json::Value\u003e,\n    ) -\u003e Self {\n        Self {\n            version: ENVELOPE_VERSION,\n            seq,\n            timestamp_ms,\n            extra_data,\n            message,\n        }\n    }\n\n    /// Checks if the envelope version is supported.\n    pub fn is_supported_version(\u0026self) -\u003e bool {\n        SUPPORTED_VERSIONS.contains(\u0026self.version)\n    }\n}\n\n/// Error returned when parsing an envelope with an unsupported version.\n#[derive(Debug, Clone, Serialize, Deserialize, TS)]\n#[ts(export)]\npub struct UnsupportedVersionError {\n    /// The version that was received.\n    pub received: u32,\n    /// The versions that are supported.\n    pub supported: Vec\u003cu32\u003e,\n}\n\nimpl std::fmt::Display for UnsupportedVersionError {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        write!(\n            f,\n            \"Unsupported envelope version {}: supported versions are {:?}\",\n            self.received, self.supported\n        )\n    }\n}\n\nimpl std::error::Error for UnsupportedVersionError {}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::contract::{BridgeStatus, ENVELOPE_VERSION, SUPPORTED_VERSIONS};\n    use serde_json::json;\n\n    // Helper to create a test BridgeMessage\n    fn test_message() -\u003e BridgeMessage {\n        BridgeMessage::AcpPayload {\n            payload: json!({\"test\": \"value\"}),\n        }\n    }\n\n    struct TestEnvelopeBuilder {\n        version: u32,\n        seq: u64,\n        timestamp_ms: u64,\n        extra_data: Option\u003cserde_json::Value\u003e,\n        message: Option\u003cBridgeMessage\u003e,\n    }\n\n    impl TestEnvelopeBuilder {\n        fn new() -\u003e Self {\n            Self {\n                version: ENVELOPE_VERSION,\n                seq: 0,\n                timestamp_ms: 1234567890,\n                extra_data: None,\n                message: None,\n            }\n        }\n\n        fn version(mut self, version: u32) -\u003e Self {\n            self.version = version;\n            self\n        }\n\n        fn seq(mut self, seq: u64) -\u003e Self {\n            self.seq = seq;\n            self\n        }\n\n        fn timestamp_ms(mut self, timestamp_ms: u64) -\u003e Self {\n            self.timestamp_ms = timestamp_ms;\n            self\n        }\n\n        fn extra_data(mut self, extra_data: serde_json::Value) -\u003e Self {\n            self.extra_data = Some(extra_data);\n            self\n        }\n\n        fn message(mut self, message: BridgeMessage) -\u003e Self {\n            self.message = Some(message);\n            self\n        }\n\n        fn build(self) -\u003e BridgeEnvelope {\n            BridgeEnvelope {\n                version: self.version,\n                seq: self.seq,\n                timestamp_ms: self.timestamp_ms,\n                extra_data: self.extra_data,\n                message: self.message.expect(\"message must be set\"),\n            }\n        }\n    }\n\n    // ========================================================================\n    // Tests for BridgeEnvelope::new()\n    // ========================================================================\n\n    #[test]\n    fn test_new_basic() {\n        let timestamp_ms = 1234567890;\n        let message = test_message();\n        let envelope = BridgeEnvelope::new(message.clone(), timestamp_ms);\n\n        assert_eq!(envelope.version, ENVELOPE_VERSION);\n        assert_eq!(envelope.seq, 0);\n        assert_eq!(envelope.timestamp_ms, timestamp_ms);\n        assert!(envelope.extra_data.is_none());\n        assert!(matches!(envelope.message, BridgeMessage::AcpPayload { .. }));\n    }\n\n    #[test]\n    fn test_new_seq_is_zero() {\n        // Verify that new() always sets seq to 0 (live mode)\n        let envelope = BridgeEnvelope::new(test_message(), 9999999999);\n        assert_eq!(envelope.seq, 0);\n    }\n\n    #[test]\n    fn test_new_extra_data_is_none() {\n        // Verify that new() always sets extra_data to None\n        let envelope = BridgeEnvelope::new(test_message(), 1234567890);\n        assert!(envelope.extra_data.is_none());\n    }\n\n    // ========================================================================\n    // Tests for BridgeEnvelope::new_replay()\n    // ========================================================================\n\n    #[test]\n    fn test_new_replay_basic() {\n        let timestamp_ms = 1234567890;\n        let seq = 42;\n        let extra_data = Some(json!({\"replaySpeed\": 2.0}));\n        let message = test_message();\n\n        let envelope =\n            BridgeEnvelope::new_replay(message.clone(), timestamp_ms, seq, extra_data.clone());\n\n        assert_eq!(envelope.version, ENVELOPE_VERSION);\n        assert_eq!(envelope.seq, seq);\n        assert_eq!(envelope.timestamp_ms, timestamp_ms);\n        assert_eq!(envelope.extra_data, extra_data);\n        assert!(matches!(envelope.message, BridgeMessage::AcpPayload { .. }));\n    }\n\n    #[test]\n    fn test_new_replay_with_none_extra_data() {\n        let timestamp_ms = 1234567890;\n        let seq = 100;\n        let extra_data = None;\n        let message = test_message();\n\n        let envelope = BridgeEnvelope::new_replay(message, timestamp_ms, seq, extra_data);\n\n        assert_eq!(envelope.seq, seq);\n        assert!(envelope.extra_data.is_none());\n    }\n\n    #[test]\n    fn test_new_replay_with_complex_extra_data() {\n        let timestamp_ms = 1234567890;\n        let seq = 200;\n        let extra_data = Some(json!({\n            \"replaySpeed\": 1.5,\n            \"sessionId\": \"abc-123\",\n            \"metadata\": {\n                \"nested\": true,\n                \"values\": [1, 2, 3]\n            }\n        }));\n        let message = test_message();\n\n        let envelope = BridgeEnvelope::new_replay(message, timestamp_ms, seq, extra_data.clone());\n\n        assert_eq!(envelope.extra_data, extra_data);\n    }\n\n    #[test]\n    fn test_new_replay_seq_can_be_large() {\n        // Test with a large sequence number\n        let large_seq = u64::MAX;\n        let envelope = BridgeEnvelope::new_replay(test_message(), 1234567890, large_seq, None);\n        assert_eq!(envelope.seq, large_seq);\n    }\n\n    // ========================================================================\n    // Tests for BridgeEnvelope::is_supported_version()\n    #[test]\n    fn test_envelope_version_constant_is_one() {\n        assert_eq!(ENVELOPE_VERSION, 1);\n    }\n\n    #[test]\n    fn test_is_supported_version_with_supported_version() {\n        // Version 1 is supported\n        let envelope = TestEnvelopeBuilder::new()\n            .version(1)\n            .message(test_message())\n            .build();\n        assert!(envelope.is_supported_version());\n    }\n\n    #[test]\n    fn test_is_supported_version_with_unsupported_version() {\n        // Version 0 is not supported\n        let envelope = TestEnvelopeBuilder::new()\n            .version(0)\n            .message(test_message())\n            .build();\n        assert!(!envelope.is_supported_version());\n    }\n\n    #[test]\n    fn test_is_supported_version_with_future_version() {\n        // Version 2 is not supported (only version 1 is)\n        let envelope = TestEnvelopeBuilder::new()\n            .version(2)\n            .message(test_message())\n            .build();\n        assert!(!envelope.is_supported_version());\n    }\n\n    #[test]\n    fn test_is_supported_version_with_large_unsupported_version() {\n        let envelope = TestEnvelopeBuilder::new()\n            .version(999)\n            .message(test_message())\n            .build();\n        assert!(!envelope.is_supported_version());\n    }\n\n    #[test]\n    fn test_supported_versions_constant() {\n        // Verify SUPPORTED_VERSIONS contains version 1\n        assert!(SUPPORTED_VERSIONS.contains(\u00261));\n        // Verify it doesn't contain other versions\n        assert!(!SUPPORTED_VERSIONS.contains(\u00260));\n        assert!(!SUPPORTED_VERSIONS.contains(\u00262));\n    }\n\n    // ========================================================================\n    // Tests for serialization/deserialization (round-trip)\n    // ========================================================================\n\n    #[test]\n    fn test_serialization_roundtrip_basic() {\n        let original = BridgeEnvelope::new(test_message(), 1234567890);\n\n        // Serialize\n        let json = serde_json::to_string(\u0026original).expect(\"Failed to serialize\");\n\n        // Deserialize\n        let deserialized: BridgeEnvelope =\n            serde_json::from_str(\u0026json).expect(\"Failed to deserialize\");\n\n        // Verify\n        assert_eq!(original.version, deserialized.version);\n        assert_eq!(original.seq, deserialized.seq);\n        assert_eq!(original.timestamp_ms, deserialized.timestamp_ms);\n        assert_eq!(original.extra_data, deserialized.extra_data);\n    }\n\n    #[test]\n    fn test_serialization_roundtrip_with_extra_data() {\n        let extra_data = Some(json!({\"key\": \"value\", \"number\": 42}));\n        let original =\n            BridgeEnvelope::new_replay(test_message(), 1234567890, 100, extra_data.clone());\n\n        // Serialize\n        let json = serde_json::to_string(\u0026original).expect(\"Failed to serialize\");\n\n        // Deserialize\n        let deserialized: BridgeEnvelope =\n            serde_json::from_str(\u0026json).expect(\"Failed to deserialize\");\n\n        // Verify\n        assert_eq!(original.version, deserialized.version);\n        assert_eq!(original.seq, deserialized.seq);\n        assert_eq!(original.timestamp_ms, deserialized.timestamp_ms);\n        assert_eq!(original.extra_data, deserialized.extra_data);\n    }\n\n    #[test]\n    fn test_serialization_skips_none_extra_data() {\n        let envelope = BridgeEnvelope::new(test_message(), 1234567890);\n\n        // Serialize\n        let json = serde_json::to_string(\u0026envelope).expect(\"Failed to serialize\");\n\n        // Verify that extra_data field is not present in JSON when None\n        assert!(!json.contains(\"extraData\"));\n        assert!(!json.contains(\"extra_data\"));\n    }\n\n    #[test]\n    fn test_serialization_includes_some_extra_data() {\n        let envelope =\n            BridgeEnvelope::new_replay(test_message(), 1234567890, 1, Some(json!({\"test\": true})));\n\n        // Serialize\n        let json = serde_json::to_string(\u0026envelope).expect(\"Failed to serialize\");\n\n        // Verify that extra_data is present in JSON\n        assert!(json.contains(\"extraData\") || json.contains(\"extra_data\"));\n    }\n\n    #[test]\n    fn test_serialization_with_different_message_types() {\n        // Test with BridgeStatus message\n        let status_message = BridgeMessage::BridgeStatus {\n            status: BridgeStatus::Connected,\n        };\n        let envelope = BridgeEnvelope::new(status_message, 1234567890);\n\n        let json = serde_json::to_string(\u0026envelope).expect(\"Failed to serialize\");\n        let deserialized: BridgeEnvelope =\n            serde_json::from_str(\u0026json).expect(\"Failed to deserialize\");\n\n        assert!(matches!(\n            deserialized.message,\n            BridgeMessage::BridgeStatus {\n                status: BridgeStatus::Connected\n            }\n        ));\n    }\n\n    #[test]\n    fn test_serialization_all_message_variants_roundtrip() {\n        // Test AcpPayload\n        let acp_envelope = BridgeEnvelope::new(\n            BridgeMessage::AcpPayload {\n                payload: json!({\"method\": \"test\", \"params\": [1, 2, 3]}),\n            },\n            1234567890,\n        );\n        let json = serde_json::to_string(\u0026acp_envelope).unwrap();\n        let deserialized: BridgeEnvelope = serde_json::from_str(\u0026json).unwrap();\n        assert!(matches!(\n            deserialized.message,\n            BridgeMessage::AcpPayload { .. }\n        ));\n\n        // Test BridgeStatus - all variants\n        for status in [\n            BridgeStatus::Starting,\n            BridgeStatus::Connected,\n            BridgeStatus::Reconnecting,\n            BridgeStatus::Disconnected,\n            BridgeStatus::Error,\n        ] {\n            let envelope = BridgeEnvelope::new(BridgeMessage::BridgeStatus { status }, 1234567890);\n            let json = serde_json::to_string(\u0026envelope).unwrap();\n            let deserialized: BridgeEnvelope = serde_json::from_str(\u0026json).unwrap();\n            assert!(matches!(\n                deserialized.message,\n                BridgeMessage::BridgeStatus { .. }\n            ));\n        }\n\n        // Test Stderr\n        let stderr_envelope = BridgeEnvelope::new(\n            BridgeMessage::Stderr {\n                line: \"Error message\".to_string(),\n            },\n            1234567890,\n        );\n        let json = serde_json::to_string(\u0026stderr_envelope).unwrap();\n        let deserialized: BridgeEnvelope = serde_json::from_str(\u0026json).unwrap();\n        match deserialized.message {\n            BridgeMessage::Stderr { line } =\u003e assert_eq!(line, \"Error message\"),\n            _ =\u003e panic!(\"Expected Stderr\"),\n        }\n\n        // Test ProcessExit\n        let exit_envelope = BridgeEnvelope::new(\n            BridgeMessage::ProcessExit {\n                code: Some(1),\n                signal: Some(\"SIGTERM\".to_string()),\n            },\n            1234567890,\n        );\n        let json = serde_json::to_string(\u0026exit_envelope).unwrap();\n        let deserialized: BridgeEnvelope = serde_json::from_str(\u0026json).unwrap();\n        match deserialized.message {\n            BridgeMessage::ProcessExit { code, signal } =\u003e {\n                assert_eq!(code, Some(1));\n                assert_eq!(signal, Some(\"SIGTERM\".to_string()));\n            }\n            _ =\u003e panic!(\"Expected ProcessExit\"),\n        }\n\n        // Test ReplayMetadata\n        let replay_envelope = BridgeEnvelope::new(\n            BridgeMessage::ReplayMetadata {\n                captured_at_ms: 1234567890,\n                total_envelopes: 100,\n                description: Some(\"Test session\".to_string()),\n            },\n            1234567890,\n        );\n        let json = serde_json::to_string(\u0026replay_envelope).unwrap();\n        let deserialized: BridgeEnvelope = serde_json::from_str(\u0026json).unwrap();\n        match deserialized.message {\n            BridgeMessage::ReplayMetadata {\n                captured_at_ms,\n                total_envelopes,\n                description,\n            } =\u003e {\n                assert_eq!(captured_at_ms, 1234567890);\n                assert_eq!(total_envelopes, 100);\n                assert_eq!(description, Some(\"Test session\".to_string()));\n            }\n            _ =\u003e panic!(\"Expected ReplayMetadata\"),\n        }\n\n        // Test StartAgent\n        let start_agent_envelope = BridgeEnvelope::new(\n            BridgeMessage::StartAgent {\n                command: \"node\".to_string(),\n                args: vec![\"script.js\".to_string()],\n                cwd: Some(\"/workspace\".to_string()),\n                env: vec![(\"NODE_ENV\".to_string(), \"test\".to_string())],\n            },\n            1234567890,\n        );\n        let json = serde_json::to_string(\u0026start_agent_envelope).unwrap();\n        let deserialized: BridgeEnvelope = serde_json::from_str(\u0026json).unwrap();\n        match deserialized.message {\n            BridgeMessage::StartAgent {\n                command,\n                args,\n                cwd,\n                env,\n            } =\u003e {\n                assert_eq!(command, \"node\");\n                assert_eq!(args, vec![\"script.js\"]);\n                assert_eq!(cwd, Some(\"/workspace\".to_string()));\n                assert_eq!(env, vec![(\"NODE_ENV\".to_string(), \"test\".to_string())]);\n            }\n            _ =\u003e panic!(\"Expected StartAgent\"),\n        }\n    }\n\n    #[test]\n    fn test_serialization_json_structure() {\n        // Verify the exact JSON structure matches expected format\n        let envelope = BridgeEnvelope::new(\n            BridgeMessage::AcpPayload {\n                payload: json!({\"test\": \"value\"}),\n            },\n            1234567890,\n        );\n\n        let json = serde_json::to_string(\u0026envelope).unwrap();\n        let value: serde_json::Value = serde_json::from_str(\u0026json).unwrap();\n\n        // Verify top-level fields\n        assert_eq!(value[\"version\"], 1);\n        assert_eq!(value[\"seq\"], 0);\n        assert_eq!(value[\"timestamp_ms\"], 1234567890);\n        assert!(value.get(\"extra_data\").is_none()); // Should be omitted when None\n        assert_eq!(value[\"type\"], \"acp_payload\");\n        assert_eq!(value[\"payload\"][\"test\"], \"value\");\n    }\n\n    #[test]\n    fn test_serialization_json_structure_with_extra_data() {\n        // Verify JSON structure with extra_data included\n        let envelope = BridgeEnvelope::new_replay(\n            BridgeMessage::AcpPayload {\n                payload: json!({\"method\": \"test\"}),\n            },\n            9876543210,\n            42,\n            Some(json!({\"replaySpeed\": 2.0, \"sessionId\": \"abc-123\"})),\n        );\n\n        let json = serde_json::to_string(\u0026envelope).unwrap();\n        let value: serde_json::Value = serde_json::from_str(\u0026json).unwrap();\n\n        // Verify all fields including extra_data\n        assert_eq!(value[\"version\"], 1);\n        assert_eq!(value[\"seq\"], 42);\n        assert_eq!(value[\"timestamp_ms\"], serde_json::json!(9876543210i64));\n        assert_eq!(value[\"extra_data\"][\"replaySpeed\"], 2.0);\n        assert_eq!(value[\"extra_data\"][\"sessionId\"], \"abc-123\");\n        assert_eq!(value[\"type\"], \"acp_payload\");\n        assert_eq!(value[\"payload\"][\"method\"], \"test\");\n    }\n\n    // ========================================================================\n    // Tests for extra_data handling edge cases\n    // ========================================================================\n\n    #[test]\n    fn test_extra_data_empty_object() {\n        let envelope = BridgeEnvelope::new_replay(test_message(), 1234567890, 1, Some(json!({})));\n        assert_eq!(envelope.extra_data, Some(json!({})));\n    }\n\n    #[test]\n    fn test_extra_data_null_value() {\n        let envelope = BridgeEnvelope::new_replay(test_message(), 1234567890, 1, Some(json!(null)));\n        assert_eq!(envelope.extra_data, Some(json!(null)));\n    }\n\n    #[test]\n    fn test_extra_data_array() {\n        let envelope = BridgeEnvelope::new_replay(\n            test_message(),\n            1234567890,\n            1,\n            Some(json!([1, 2, 3, \"test\"])),\n        );\n        assert_eq!(envelope.extra_data, Some(json!([1, 2, 3, \"test\"])));\n    }\n\n    #[test]\n    fn test_extra_data_large_string() {\n        let large_string = \"x\".repeat(10000);\n        let envelope = BridgeEnvelope::new_replay(\n            test_message(),\n            1234567890,\n            1,\n            Some(json!(large_string.clone())),\n        );\n        assert_eq!(envelope.extra_data, Some(json!(large_string)));\n    }\n\n    #[test]\n    fn test_extra_data_deeply_nested() {\n        let nested = json!({\n            \"level1\": {\n                \"level2\": {\n                    \"level3\": {\n                        \"level4\": {\n                            \"value\": \"deep\"\n                        }\n                    }\n                }\n            }\n        });\n        let envelope =\n            BridgeEnvelope::new_replay(test_message(), 1234567890, 1, Some(nested.clone()));\n        assert_eq!(envelope.extra_data, Some(nested));\n    }\n\n    // ========================================================================\n    // Tests using EnvelopeBuilder\n    // ========================================================================\n\n    #[test]\n    fn test_envelope_builder_default_values() {\n        let envelope = TestEnvelopeBuilder::new().message(test_message()).build();\n\n        assert_eq!(envelope.version, ENVELOPE_VERSION);\n        assert_eq!(envelope.seq, 0);\n        assert_eq!(envelope.timestamp_ms, 1234567890);\n        assert!(envelope.extra_data.is_none());\n    }\n\n    #[test]\n    fn test_envelope_builder_with_all_fields() {\n        let envelope = TestEnvelopeBuilder::new()\n            .version(1)\n            .seq(50)\n            .timestamp_ms(1234567890)\n            .extra_data(json!({\"custom\": \"data\"}))\n            .message(test_message())\n            .build();\n\n        assert_eq!(envelope.version, 1);\n        assert_eq!(envelope.seq, 50);\n        assert_eq!(envelope.timestamp_ms, 1234567890);\n        assert_eq!(envelope.extra_data, Some(json!({\"custom\": \"data\"})));\n    }\n\n    #[test]\n    fn test_envelope_builder_version_override() {\n        // Test building with unsupported version (for testing error cases)\n        let envelope = TestEnvelopeBuilder::new()\n            .version(999)\n            .message(test_message())\n            .build();\n\n        assert_eq!(envelope.version, 999);\n        assert!(!envelope.is_supported_version());\n    }\n\n    // ========================================================================\n    // Tests for UnsupportedVersionError\n    // ========================================================================\n\n    #[test]\n    fn test_unsupported_version_error_display() {\n        let error = UnsupportedVersionError {\n            received: 999,\n            supported: SUPPORTED_VERSIONS.to_vec(),\n        };\n\n        let display = format!(\"{}\", error);\n        assert!(display.contains(\"999\"));\n        assert!(display.contains(\"supported versions\"));\n        assert!(display.contains(\"[1]\"));\n    }\n\n    #[test]\n    fn test_unsupported_version_error_debug() {\n        let error = UnsupportedVersionError {\n            received: 0,\n            supported: vec![1],\n        };\n\n        let debug = format!(\"{:?}\", error);\n        assert!(debug.contains(\"UnsupportedVersionError\"));\n    }\n\n    // ========================================================================\n    // Tests for valid envelope JSON parsing\n    // ========================================================================\n\n    #[test]\n    fn test_parse_valid_envelope_minimal() {\n        // Minimal valid envelope with only required fields\n        let json = json!({\n            \"version\": 1,\n            \"seq\": 0,\n            \"timestamp_ms\": 1234567890,\n            \"type\": \"acp_payload\",\n            \"payload\": {\"jsonrpc\": \"2.0\", \"method\": \"test\"}\n        });\n\n        let envelope: BridgeEnvelope =\n            serde_json::from_value(json).expect(\"Should parse valid minimal envelope\");\n\n        assert_eq!(envelope.version, 1);\n        assert_eq!(envelope.seq, 0);\n        assert_eq!(envelope.timestamp_ms, 1234567890);\n        assert!(envelope.extra_data.is_none());\n    }\n\n    #[test]\n    fn test_parse_valid_envelope_with_extra_data() {\n        let json = serde_json::json!({\n            \"version\": 1,\n            \"seq\": 42,\n            \"timestamp_ms\": 1234567890,\n            \"extra_data\": {\"replaySpeed\": 2.0, \"sessionId\": \"abc-123\"},\n            \"type\": \"acp_payload\",\n            \"payload\": {\"method\": \"test\"}\n        });\n\n        let envelope: BridgeEnvelope =\n            serde_json::from_value(json).expect(\"Should parse valid envelope with extra_data\");\n\n        assert_eq!(envelope.version, 1);\n        assert_eq!(envelope.seq, 42);\n        assert!(envelope.extra_data.is_some());\n    }\n\n    #[test]\n    fn test_parse_valid_envelope_all_message_types() {\n        // Test AcpPayload\n        let json = json!({\n            \"version\": 1, \"seq\": 0, \"timestamp_ms\": 1,\n            \"type\": \"acp_payload\", \"payload\": {\"method\": \"test\"}\n        });\n        assert!(serde_json::from_value::\u003cBridgeEnvelope\u003e(json).is_ok());\n\n        // Test BridgeStatus\n        let json = json!({\n            \"version\": 1, \"seq\": 0, \"timestamp_ms\": 1,\n            \"type\": \"bridge_status\", \"status\": \"connected\"\n        });\n        assert!(serde_json::from_value::\u003cBridgeEnvelope\u003e(json).is_ok());\n\n        // Test Stderr\n        let json = json!({\n            \"version\": 1, \"seq\": 0, \"timestamp_ms\": 1,\n            \"type\": \"stderr\", \"line\": \"Error message\"\n        });\n        assert!(serde_json::from_value::\u003cBridgeEnvelope\u003e(json).is_ok());\n\n        // Test ProcessExit\n        let json = json!({\n            \"version\": 1, \"seq\": 0, \"timestamp_ms\": 1,\n            \"type\": \"process_exit\", \"code\": 1, \"signal\": \"SIGTERM\"\n        });\n        assert!(serde_json::from_value::\u003cBridgeEnvelope\u003e(json).is_ok());\n\n        // Test ReplayMetadata\n        let json = json!({\n            \"version\": 1, \"seq\": 0, \"timestamp_ms\": 1,\n            \"type\": \"replay_metadata\",\n            \"captured_at_ms\": 123, \"total_envelopes\": 100, \"description\": \"Test\"\n        });\n        assert!(serde_json::from_value::\u003cBridgeEnvelope\u003e(json).is_ok());\n\n        // Test StartAgent\n        let json = json!({\n            \"version\": 1, \"seq\": 0, \"timestamp_ms\": 1,\n            \"type\": \"start_agent\",\n            \"command\": \"node\", \"args\": [\"script.js\"], \"cwd\": \"/workspace\",\n            \"env\": [[\"NODE_ENV\", \"test\"]]\n        });\n        assert!(serde_json::from_value::\u003cBridgeEnvelope\u003e(json).is_ok());\n    }\n\n    // ========================================================================\n    // Tests for invalid envelope rejection - missing required fields\n    // ========================================================================\n\n    #[test]\n    fn test_parse_invalid_envelope_missing_version() {\n        let json = serde_json::json!({\n            \"seq\": 0,\n            \"timestamp_ms\": \"1234567890\",\n            \"type\": \"acp_payload\",\n            \"payload\": {\"method\": \"test\"}\n        });\n\n        let result: Result\u003cBridgeEnvelope, _\u003e = serde_json::from_value(json);\n        assert!(result.is_err(), \"Should fail without version field\");\n    }\n\n    #[test]\n    fn test_parse_invalid_envelope_missing_seq() {\n        let json = json!({\n            \"version\": 1,\n            \"timestamp_ms\": 1234567890,\n            \"type\": \"acp_payload\",\n            \"payload\": {\"method\": \"test\"}\n        });\n\n        let result: Result\u003cBridgeEnvelope, _\u003e = serde_json::from_value(json);\n        assert!(result.is_err(), \"Should fail without seq field\");\n    }\n\n    #[test]\n    fn test_parse_invalid_envelope_missing_timestamp() {\n        let json = json!({\n            \"version\": 1,\n            \"seq\": 0,\n            \"type\": \"acp_payload\",\n            \"payload\": {\"method\": \"test\"}\n        });\n\n        let result: Result\u003cBridgeEnvelope, _\u003e = serde_json::from_value(json);\n        assert!(result.is_err(), \"Should fail without timestamp_ms field\");\n    }\n\n    #[test]\n    fn test_parse_invalid_envelope_missing_message_type() {\n        let json = json!({\n            \"version\": 1,\n            \"seq\": 0,\n            \"timestamp_ms\": 1234567890\n            // Missing type field for BridgeMessage\n        });\n\n        let result: Result\u003cBridgeEnvelope, _\u003e = serde_json::from_value(json);\n        assert!(result.is_err(), \"Should fail without message type field\");\n    }\n\n    #[test]\n    fn test_parse_invalid_envelope_missing_payload_for_acp() {\n        let json = json!({\n            \"version\": 1,\n            \"seq\": 0,\n            \"timestamp_ms\": 1234567890,\n            \"type\": \"acp_payload\"\n            // Missing payload field\n        });\n\n        let result: Result\u003cBridgeEnvelope, _\u003e = serde_json::from_value(json);\n        assert!(\n            result.is_err(),\n            \"Should fail without payload for acp_payload type\"\n        );\n    }\n\n    // ========================================================================\n    // Tests for invalid envelope rejection - wrong field types\n    // ========================================================================\n\n    #[test]\n    fn test_parse_invalid_envelope_wrong_version_type() {\n        let json = json!({\n            \"version\": \"1\",  // String instead of number\n            \"seq\": 0,\n            \"timestamp_ms\": 1234567890,\n            \"type\": \"acp_payload\",\n            \"payload\": {\"method\": \"test\"}\n        });\n\n        let result: Result\u003cBridgeEnvelope, _\u003e = serde_json::from_value(json);\n        assert!(result.is_err(), \"Should fail with string version\");\n    }\n\n    #[test]\n    fn test_parse_invalid_envelope_wrong_seq_type() {\n        let json = json!({\n            \"version\": 1,\n            \"seq\": \"zero\",  // String instead of number\n            \"timestamp_ms\": 1234567890,\n            \"type\": \"acp_payload\",\n            \"payload\": {\"method\": \"test\"}\n        });\n\n        let result: Result\u003cBridgeEnvelope, _\u003e = serde_json::from_value(json);\n        assert!(result.is_err(), \"Should fail with string seq\");\n    }\n\n    #[test]\n    fn test_parse_invalid_envelope_wrong_timestamp_type() {\n        let json = json!({\n            \"version\": 1,\n            \"seq\": 0,\n            \"timestamp_ms\": \"1234567890\",  // String instead of number\n            \"type\": \"acp_payload\",\n            \"payload\": {\"method\": \"test\"}\n        });\n\n        let result: Result\u003cBridgeEnvelope, _\u003e = serde_json::from_value(json);\n        assert!(result.is_err(), \"Should fail with string timestamp\");\n    }\n\n    #[test]\n    fn test_extra_data_accepts_all_json_types() {\n        let json_string = json!({\n            \"version\": 1,\n            \"seq\": 0,\n            \"timestamp_ms\": 1234567890,\n            \"extra_data\": \"string value\",\n            \"type\": \"acp_payload\",\n            \"payload\": {\"method\": \"test\"}\n        });\n        assert!(serde_json::from_value::\u003cBridgeEnvelope\u003e(json_string).is_ok());\n\n        let json_number = json!({\n            \"version\": 1,\n            \"seq\": 0,\n            \"timestamp_ms\": 1234567890,\n            \"extra_data\": 42,\n            \"type\": \"acp_payload\",\n            \"payload\": {\"method\": \"test\"}\n        });\n        assert!(serde_json::from_value::\u003cBridgeEnvelope\u003e(json_number).is_ok());\n\n        let json_array = json!({\n            \"version\": 1,\n            \"seq\": 0,\n            \"timestamp_ms\": 1234567890,\n            \"extra_data\": [1, 2, 3],\n            \"type\": \"acp_payload\",\n            \"payload\": {\"method\": \"test\"}\n        });\n        assert!(serde_json::from_value::\u003cBridgeEnvelope\u003e(json_array).is_ok());\n    }\n\n    #[test]\n    fn test_parse_invalid_envelope_unknown_message_type() {\n        let json = json!({\n            \"version\": 1,\n            \"seq\": 0,\n            \"timestamp_ms\": 1234567890,\n            \"type\": \"unknown_type\",  // Not a valid BridgeMessage variant\n            \"data\": {}\n        });\n\n        let result: Result\u003cBridgeEnvelope, _\u003e = serde_json::from_value(json);\n        assert!(result.is_err(), \"Should fail with unknown message type\");\n    }\n\n    // ========================================================================\n    // Tests for version validation\n    // ========================================================================\n\n    #[test]\n    fn test_version_validation_supported_version_1() {\n        let json = json!({\n            \"version\": 1,\n            \"seq\": 0,\n            \"timestamp_ms\": 1234567890,\n            \"type\": \"acp_payload\",\n            \"payload\": {\"method\": \"test\"}\n        });\n\n        let envelope: BridgeEnvelope =\n            serde_json::from_value(json).expect(\"Should parse version 1\");\n        assert!(envelope.is_supported_version());\n    }\n\n    #[test]\n    fn test_version_validation_unsupported_version_0() {\n        let json = json!({\n            \"version\": 0,\n            \"seq\": 0,\n            \"timestamp_ms\": 1234567890,\n            \"type\": \"acp_payload\",\n            \"payload\": {\"method\": \"test\"}\n        });\n\n        let envelope: BridgeEnvelope =\n            serde_json::from_value(json).expect(\"Should parse version 0 (but it's unsupported)\");\n        assert!(!envelope.is_supported_version());\n    }\n\n    #[test]\n    fn test_version_validation_unsupported_version_2() {\n        let json = json!({\n            \"version\": 2,\n            \"seq\": 0,\n            \"timestamp_ms\": 1234567890,\n            \"type\": \"acp_payload\",\n            \"payload\": {\"method\": \"test\"}\n        });\n\n        let envelope: BridgeEnvelope =\n            serde_json::from_value(json).expect(\"Should parse version 2 (but it's unsupported)\");\n        assert!(!envelope.is_supported_version());\n    }\n\n    #[test]\n    fn test_version_validation_unsupported_large_version() {\n        let json = json!({\n            \"version\": 999,\n            \"seq\": 0,\n            \"timestamp_ms\": 1234567890,\n            \"type\": \"acp_payload\",\n            \"payload\": {\"method\": \"test\"}\n        });\n\n        let envelope: BridgeEnvelope =\n            serde_json::from_value(json).expect(\"Should parse version 999\");\n        assert!(!envelope.is_supported_version());\n    }\n\n    // ========================================================================\n    // Tests for malformed JSON handling\n    // ========================================================================\n\n    #[test]\n    fn test_malformed_json_empty_string() {\n        let result: Result\u003cBridgeEnvelope, _\u003e = serde_json::from_str(\"\");\n        assert!(result.is_err(), \"Should fail with empty string\");\n    }\n\n    #[test]\n    fn test_malformed_json_invalid_syntax() {\n        let result: Result\u003cBridgeEnvelope, _\u003e = serde_json::from_str(\"{ invalid json }\");\n        assert!(result.is_err(), \"Should fail with invalid JSON syntax\");\n    }\n\n    #[test]\n    fn test_malformed_json_trailing_comma() {\n        let result: Result\u003cBridgeEnvelope, _\u003e = serde_json::from_str(\n            r#\"{\"version\": 1, \"seq\": 0, \"timestamp_ms\": 1, \"type\": \"acp_payload\", \"payload\": {},}\"#,\n        );\n        assert!(result.is_err(), \"Should fail with trailing comma\");\n    }\n\n    #[test]\n    fn test_malformed_json_missing_closing_brace() {\n        let result: Result\u003cBridgeEnvelope, _\u003e =\n            serde_json::from_str(r#\"{\"version\": 1, \"seq\": 0, \"timestamp_ms\": 1\"#);\n        assert!(result.is_err(), \"Should fail with missing closing brace\");\n    }\n\n    #[test]\n    fn test_malformed_json_not_an_object() {\n        let result: Result\u003cBridgeEnvelope, _\u003e = serde_json::from_str(\"[]\");\n        assert!(result.is_err(), \"Should fail with array instead of object\");\n\n        let result: Result\u003cBridgeEnvelope, _\u003e = serde_json::from_str(\"\\\"string\\\"\");\n        assert!(result.is_err(), \"Should fail with string instead of object\");\n\n        let result: Result\u003cBridgeEnvelope, _\u003e = serde_json::from_str(\"123\");\n        assert!(result.is_err(), \"Should fail with number instead of object\");\n    }\n\n    #[test]\n    fn test_malformed_json_null() {\n        let result: Result\u003cBridgeEnvelope, _\u003e = serde_json::from_str(\"null\");\n        assert!(result.is_err(), \"Should fail with null\");\n    }\n\n    // ========================================================================\n    // Tests for edge cases - empty strings, null values, extra fields\n    // ========================================================================\n\n    #[test]\n    fn test_edge_case_empty_string_in_message() {\n        // Empty string in payload\n        let json = json!({\n            \"version\": 1,\n            \"seq\": 0,\n            \"timestamp_ms\": 1234567890,\n            \"type\": \"stderr\",\n            \"line\": \"\"\n        });\n\n        let envelope: BridgeEnvelope =\n            serde_json::from_value(json).expect(\"Should parse with empty line\");\n\n        match envelope.message {\n            BridgeMessage::Stderr { ref line } =\u003e assert_eq!(line, \"\"),\n            _ =\u003e panic!(\"Expected Stderr message\"),\n        }\n    }\n\n    #[test]\n    fn test_edge_case_null_extra_data() {\n        // Explicit null for extraData should be treated as None\n        let json = json!({\n            \"version\": 1,\n            \"seq\": 0,\n            \"timestamp_ms\": 1234567890,\n            \"extraData\": null,\n            \"type\": \"acp_payload\",\n            \"payload\": {\"method\": \"test\"}\n        });\n\n        let envelope: BridgeEnvelope =\n            serde_json::from_value(json).expect(\"Should parse with null extraData\");\n        assert!(envelope.extra_data.is_none());\n    }\n\n    #[test]\n    fn test_edge_case_extra_fields_ignored() {\n        // Extra unknown fields should be ignored by serde\n        let json = json!({\n            \"version\": 1,\n            \"seq\": 0,\n            \"timestamp_ms\": 1234567890,\n            \"type\": \"acp_payload\",\n            \"payload\": {\"method\": \"test\"},\n            \"unknownField\": \"should be ignored\",\n            \"anotherUnknown\": {\"nested\": \"value\"}\n        });\n\n        let envelope: BridgeEnvelope =\n            serde_json::from_value(json).expect(\"Should parse with extra unknown fields\");\n\n        assert_eq!(envelope.version, 1);\n        assert_eq!(envelope.seq, 0);\n    }\n\n    #[test]\n    fn test_edge_case_empty_payload_object() {\n        let json = json!({\n            \"version\": 1,\n            \"seq\": 0,\n            \"timestamp_ms\": 1234567890,\n            \"type\": \"acp_payload\",\n            \"payload\": {}\n        });\n\n        let envelope: BridgeEnvelope =\n            serde_json::from_value(json).expect(\"Should parse with empty payload object\");\n\n        match envelope.message {\n            BridgeMessage::AcpPayload { ref payload } =\u003e {\n                assert_eq!(payload, \u0026json!({}));\n            }\n            _ =\u003e panic!(\"Expected AcpPayload message\"),\n        }\n    }\n\n    #[test]\n    fn test_edge_case_large_seq_value() {\n        let json = json!({\n            \"version\": 1,\n            \"seq\": u64::MAX,\n            \"timestamp_ms\": 1234567890,\n            \"type\": \"acp_payload\",\n            \"payload\": {\"method\": \"test\"}\n        });\n\n        let envelope: BridgeEnvelope =\n            serde_json::from_value(json).expect(\"Should parse with max seq value\");\n        assert_eq!(envelope.seq, u64::MAX);\n    }\n\n    #[test]\n    fn test_edge_case_zero_timestamp() {\n        let json = json!({\n            \"version\": 1,\n            \"seq\": 0,\n            \"timestamp_ms\": 0,\n            \"type\": \"acp_payload\",\n            \"payload\": {\"method\": \"test\"}\n        });\n\n        let envelope: BridgeEnvelope =\n            serde_json::from_value(json).expect(\"Should parse with zero timestamp\");\n        assert_eq!(envelope.timestamp_ms, 0);\n    }\n\n    #[test]\n    fn test_edge_case_empty_extra_data_object() {\n        let json = json!({\n            \"version\": 1,\n            \"seq\": 0,\n            \"timestamp_ms\": 1234567890,\n            \"extra_data\": {},\n            \"type\": \"acp_payload\",\n            \"payload\": {\"method\": \"test\"}\n        });\n\n        let envelope: BridgeEnvelope =\n            serde_json::from_value(json).expect(\"Should parse with empty extra_data object\");\n        // Empty object is preserved as Some(Object({}))\n        assert!(envelope.extra_data.is_some());\n    }\n\n    #[test]\n    fn test_edge_case_process_exit_with_nulls() {\n        let json = json!({\n            \"version\": 1,\n            \"seq\": 0,\n            \"timestamp_ms\": 1234567890,\n            \"type\": \"process_exit\",\n            \"code\": null,\n            \"signal\": null\n        });\n\n        let envelope: BridgeEnvelope =\n            serde_json::from_value(json).expect(\"Should parse process_exit with nulls\");\n\n        match envelope.message {\n            BridgeMessage::ProcessExit { code, signal } =\u003e {\n                assert_eq!(code, None);\n                assert_eq!(signal, None);\n            }\n            _ =\u003e panic!(\"Expected ProcessExit message\"),\n        }\n    }\n\n    #[test]\n    fn test_edge_case_start_agent_with_empty_arrays() {\n        let json = json!({\n            \"version\": 1,\n            \"seq\": 0,\n            \"timestamp_ms\": 1234567890,\n            \"type\": \"start_agent\",\n            \"command\": \"node\",\n            \"args\": [],\n            \"cwd\": null,\n            \"env\": []\n        });\n\n        let envelope: BridgeEnvelope =\n            serde_json::from_value(json).expect(\"Should parse start_agent with empty arrays\");\n\n        match envelope.message {\n            BridgeMessage::StartAgent {\n                command,\n                args,\n                cwd,\n                env,\n            } =\u003e {\n                assert_eq!(command, \"node\");\n                assert_eq!(args, Vec::\u003cString\u003e::new());\n                assert_eq!(cwd, None);\n                assert_eq!(env, Vec::\u003c(String, String)\u003e::new());\n            }\n            _ =\u003e panic!(\"Expected StartAgent message\"),\n        }\n    }\n}\n","traces":[{"line":40,"address":[4946096],"length":1,"stats":{"Line":3}},{"line":51,"address":[4945952],"length":1,"stats":{"Line":5}},{"line":67,"address":[4946048],"length":1,"stats":{"Line":4}},{"line":68,"address":[4946056],"length":1,"stats":{"Line":3}},{"line":83,"address":[4945552],"length":1,"stats":{"Line":1}},{"line":84,"address":[4945576],"length":1,"stats":{"Line":1}}],"covered":6,"coverable":6},{"path":["/","home","blake","Documents","software","acp-react-chat-ui","crates","acp-ws-bridge","src","contract","message.rs"],"content":"//! Message types for bridge envelopes.\n\nuse serde::{Deserialize, Serialize};\nuse ts_rs::TS;\n\n/// Bridge message variants for all browser-facing communications.\n///\n/// The bridge passes ACP payloads through unchanged. It does not normalize\n/// or interpret ACP semantics.\n#[derive(Debug, Clone, PartialEq, Serialize, Deserialize, TS)]\n#[serde(tag = \"type\", rename_all = \"snake_case\")]\n#[ts(export)]\npub enum BridgeMessage {\n    /// Raw ACP JSON-RPC payload from the agent's stdout.\n    /// The bridge does not parse or modify the payload.\n    AcpPayload {\n        /// The raw JSON-RPC message as received from the ACP agent.\n        /// This is an opaque value — the bridge does not interpret it.\n        payload: serde_json::Value,\n    },\n\n    /// Bridge lifecycle state change.\n    BridgeStatus {\n        /// The new bridge state.\n        status: BridgeStatus,\n    },\n\n    /// A line of stderr output from the ACP process.\n    Stderr {\n        /// The stderr line content.\n        line: String,\n    },\n\n    /// Notification that the ACP process has exited.\n    ProcessExit {\n        /// The exit code, if available.\n        code: Option\u003ci32\u003e,\n        /// Signal that terminated the process, if any.\n        signal: Option\u003cString\u003e,\n    },\n\n    /// Replay metadata at the start of a replay session.\n    ReplayMetadata {\n        /// Original capture timestamp in milliseconds.\n        #[ts(type = \"number\")]\n        captured_at_ms: u64,\n        /// Total number of envelopes in the replay file.\n        #[ts(type = \"number\")]\n        total_envelopes: u64,\n        /// Optional description of the captured session.\n        description: Option\u003cString\u003e,\n    },\n\n    /// Command to spawn an ACP agent process (client-to-server).\n    StartAgent {\n        /// Command to execute.\n        command: String,\n        /// Command arguments.\n        args: Vec\u003cString\u003e,\n        /// Working directory for the process.\n        cwd: Option\u003cString\u003e,\n        /// Environment variables as key-value pairs.\n        env: Vec\u003c(String, String)\u003e,\n    },\n}\n\n/// Bridge lifecycle states.\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize, TS)]\n#[serde(rename_all = \"snake_case\")]\n#[ts(export)]\npub enum BridgeStatus {\n    /// Bridge is starting up.\n    Starting,\n    /// Bridge is connected and proxying ACP traffic.\n    Connected,\n    /// Bridge is reconnecting after a disconnect.\n    Reconnecting,\n    /// Bridge has disconnected.\n    Disconnected,\n    /// Bridge encountered an error.\n    Error,\n}\n\nimpl BridgeMessage {\n    /// Creates a new ACP payload message.\n    pub fn acp_payload(payload: serde_json::Value) -\u003e Self {\n        Self::AcpPayload { payload }\n    }\n\n    /// Creates a new bridge status message.\n    pub fn bridge_status(status: BridgeStatus) -\u003e Self {\n        Self::BridgeStatus { status }\n    }\n\n    /// Creates a new stderr message.\n    pub fn stderr(line: String) -\u003e Self {\n        Self::Stderr { line }\n    }\n\n    /// Creates a new process exit message.\n    pub fn process_exit(code: Option\u003ci32\u003e, signal: Option\u003cString\u003e) -\u003e Self {\n        Self::ProcessExit { code, signal }\n    }\n\n    /// Creates a new replay metadata message.\n    pub fn replay_metadata(\n        captured_at_ms: u64,\n        total_envelopes: u64,\n        description: Option\u003cString\u003e,\n    ) -\u003e Self {\n        Self::ReplayMetadata {\n            captured_at_ms,\n            total_envelopes,\n            description,\n        }\n    }\n\n    /// Creates a new start agent message.\n    pub fn start_agent(\n        command: String,\n        args: Vec\u003cString\u003e,\n        cwd: Option\u003cString\u003e,\n        env: Vec\u003c(String, String)\u003e,\n    ) -\u003e Self {\n        Self::StartAgent {\n            command,\n            args,\n            cwd,\n            env,\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::test_utils::MessageBuilder;\n    use serde_json::json;\n\n    // ========================================================================\n    // Tests for BridgeMessage variants - construction and pattern matching\n    // ========================================================================\n\n    #[test]\n    fn test_acp_payload_variant() {\n        let payload = json!({\"method\": \"test\", \"params\": {\"key\": \"value\"}});\n        let msg = BridgeMessage::AcpPayload {\n            payload: payload.clone(),\n        };\n\n        match msg {\n            BridgeMessage::AcpPayload { payload: p } =\u003e {\n                assert_eq!(p, payload);\n            }\n            _ =\u003e panic!(\"Expected AcpPayload variant\"),\n        }\n    }\n\n    #[test]\n    fn test_bridge_status_variant() {\n        let msg = BridgeMessage::BridgeStatus {\n            status: BridgeStatus::Connected,\n        };\n\n        match msg {\n            BridgeMessage::BridgeStatus { status } =\u003e {\n                assert_eq!(status, BridgeStatus::Connected);\n            }\n            _ =\u003e panic!(\"Expected BridgeStatus variant\"),\n        }\n    }\n\n    #[test]\n    fn test_stderr_variant() {\n        let error_line = \"Error: Connection failed\".to_string();\n        let msg = BridgeMessage::Stderr {\n            line: error_line.clone(),\n        };\n\n        match msg {\n            BridgeMessage::Stderr { line } =\u003e {\n                assert_eq!(line, error_line);\n            }\n            _ =\u003e panic!(\"Expected Stderr variant\"),\n        }\n    }\n\n    #[test]\n    fn test_process_exit_variant_with_code_and_signal() {\n        let msg = BridgeMessage::ProcessExit {\n            code: Some(1),\n            signal: Some(\"SIGTERM\".to_string()),\n        };\n\n        match msg {\n            BridgeMessage::ProcessExit { code, signal } =\u003e {\n                assert_eq!(code, Some(1));\n                assert_eq!(signal, Some(\"SIGTERM\".to_string()));\n            }\n            _ =\u003e panic!(\"Expected ProcessExit variant\"),\n        }\n    }\n\n    #[test]\n    fn test_process_exit_variant_without_code() {\n        let msg = BridgeMessage::ProcessExit {\n            code: None,\n            signal: Some(\"SIGKILL\".to_string()),\n        };\n\n        match msg {\n            BridgeMessage::ProcessExit { code, signal } =\u003e {\n                assert_eq!(code, None);\n                assert_eq!(signal, Some(\"SIGKILL\".to_string()));\n            }\n            _ =\u003e panic!(\"Expected ProcessExit variant\"),\n        }\n    }\n\n    #[test]\n    fn test_process_exit_variant_without_signal() {\n        let msg = BridgeMessage::ProcessExit {\n            code: Some(0),\n            signal: None,\n        };\n\n        match msg {\n            BridgeMessage::ProcessExit { code, signal } =\u003e {\n                assert_eq!(code, Some(0));\n                assert_eq!(signal, None);\n            }\n            _ =\u003e panic!(\"Expected ProcessExit variant\"),\n        }\n    }\n\n    #[test]\n    fn test_replay_metadata_variant_with_description() {\n        let msg = BridgeMessage::ReplayMetadata {\n            captured_at_ms: 1234567890,\n            total_envelopes: 100,\n            description: Some(\"Test session\".to_string()),\n        };\n\n        match msg {\n            BridgeMessage::ReplayMetadata {\n                captured_at_ms,\n                total_envelopes,\n                description,\n            } =\u003e {\n                assert_eq!(captured_at_ms, 1234567890);\n                assert_eq!(total_envelopes, 100);\n                assert_eq!(description, Some(\"Test session\".to_string()));\n            }\n            _ =\u003e panic!(\"Expected ReplayMetadata variant\"),\n        }\n    }\n\n    #[test]\n    fn test_replay_metadata_variant_without_description() {\n        let msg = BridgeMessage::ReplayMetadata {\n            captured_at_ms: 9876543210,\n            total_envelopes: 500,\n            description: None,\n        };\n\n        match msg {\n            BridgeMessage::ReplayMetadata {\n                captured_at_ms,\n                total_envelopes,\n                description,\n            } =\u003e {\n                assert_eq!(captured_at_ms, 9876543210);\n                assert_eq!(total_envelopes, 500);\n                assert_eq!(description, None);\n            }\n            _ =\u003e panic!(\"Expected ReplayMetadata variant\"),\n        }\n    }\n\n    #[test]\n    fn test_start_agent_variant_with_all_fields() {\n        let msg = BridgeMessage::StartAgent {\n            command: \"node\".to_string(),\n            args: vec![\"script.js\".to_string(), \"--verbose\".to_string()],\n            cwd: Some(\"/workspace\".to_string()),\n            env: vec![\n                (\"NODE_ENV\".to_string(), \"test\".to_string()),\n                (\"DEBUG\".to_string(), \"true\".to_string()),\n            ],\n        };\n\n        match msg {\n            BridgeMessage::StartAgent {\n                command,\n                args,\n                cwd,\n                env,\n            } =\u003e {\n                assert_eq!(command, \"node\");\n                assert_eq!(args, vec![\"script.js\", \"--verbose\"]);\n                assert_eq!(cwd, Some(\"/workspace\".to_string()));\n                assert_eq!(\n                    env,\n                    vec![\n                        (\"NODE_ENV\".to_string(), \"test\".to_string()),\n                        (\"DEBUG\".to_string(), \"true\".to_string())\n                    ]\n                );\n            }\n            _ =\u003e panic!(\"Expected StartAgent variant\"),\n        }\n    }\n\n    #[test]\n    fn test_start_agent_variant_minimal() {\n        let msg = BridgeMessage::StartAgent {\n            command: \"python\".to_string(),\n            args: vec![],\n            cwd: None,\n            env: vec![],\n        };\n\n        match msg {\n            BridgeMessage::StartAgent {\n                command,\n                args,\n                cwd,\n                env,\n            } =\u003e {\n                assert_eq!(command, \"python\");\n                assert!(args.is_empty());\n                assert_eq!(cwd, None);\n                assert!(env.is_empty());\n            }\n            _ =\u003e panic!(\"Expected StartAgent variant\"),\n        }\n    }\n\n    // ========================================================================\n    // Tests for factory methods\n    // ========================================================================\n\n    #[test]\n    fn test_acp_payload_factory() {\n        let payload = json!({\"jsonrpc\": \"2.0\", \"method\": \"initialize\"});\n        let msg = BridgeMessage::acp_payload(payload.clone());\n\n        match msg {\n            BridgeMessage::AcpPayload { payload: p } =\u003e {\n                assert_eq!(p, payload);\n            }\n            _ =\u003e panic!(\"Expected AcpPayload from factory\"),\n        }\n    }\n\n    #[test]\n    fn test_bridge_status_factory() {\n        let msg = BridgeMessage::bridge_status(BridgeStatus::Reconnecting);\n\n        match msg {\n            BridgeMessage::BridgeStatus { status } =\u003e {\n                assert_eq!(status, BridgeStatus::Reconnecting);\n            }\n            _ =\u003e panic!(\"Expected BridgeStatus from factory\"),\n        }\n    }\n\n    #[test]\n    fn test_stderr_factory() {\n        let msg = BridgeMessage::stderr(\"Test error message\".to_string());\n\n        match msg {\n            BridgeMessage::Stderr { line } =\u003e {\n                assert_eq!(line, \"Test error message\");\n            }\n            _ =\u003e panic!(\"Expected Stderr from factory\"),\n        }\n    }\n\n    #[test]\n    fn test_process_exit_factory_with_all_params() {\n        let msg = BridgeMessage::process_exit(Some(127), Some(\"SIGSEGV\".to_string()));\n\n        match msg {\n            BridgeMessage::ProcessExit { code, signal } =\u003e {\n                assert_eq!(code, Some(127));\n                assert_eq!(signal, Some(\"SIGSEGV\".to_string()));\n            }\n            _ =\u003e panic!(\"Expected ProcessExit from factory\"),\n        }\n    }\n\n    #[test]\n    fn test_process_exit_factory_with_none_params() {\n        let msg = BridgeMessage::process_exit(None, None);\n\n        match msg {\n            BridgeMessage::ProcessExit { code, signal } =\u003e {\n                assert_eq!(code, None);\n                assert_eq!(signal, None);\n            }\n            _ =\u003e panic!(\"Expected ProcessExit from factory\"),\n        }\n    }\n\n    #[test]\n    fn test_replay_metadata_factory_with_description() {\n        let msg =\n            BridgeMessage::replay_metadata(1111111111, 250, Some(\"Captured session\".to_string()));\n\n        match msg {\n            BridgeMessage::ReplayMetadata {\n                captured_at_ms,\n                total_envelopes,\n                description,\n            } =\u003e {\n                assert_eq!(captured_at_ms, 1111111111);\n                assert_eq!(total_envelopes, 250);\n                assert_eq!(description, Some(\"Captured session\".to_string()));\n            }\n            _ =\u003e panic!(\"Expected ReplayMetadata from factory\"),\n        }\n    }\n\n    #[test]\n    fn test_replay_metadata_factory_without_description() {\n        let msg = BridgeMessage::replay_metadata(2222222222, 300, None);\n\n        match msg {\n            BridgeMessage::ReplayMetadata {\n                captured_at_ms,\n                total_envelopes,\n                description,\n            } =\u003e {\n                assert_eq!(captured_at_ms, 2222222222);\n                assert_eq!(total_envelopes, 300);\n                assert_eq!(description, None);\n            }\n            _ =\u003e panic!(\"Expected ReplayMetadata from factory\"),\n        }\n    }\n\n    #[test]\n    fn test_start_agent_factory_with_all_params() {\n        let msg = BridgeMessage::start_agent(\n            \"cargo\".to_string(),\n            vec![\"run\".to_string(), \"--release\".to_string()],\n            Some(\"/project\".to_string()),\n            vec![\n                (\"RUST_LOG\".to_string(), \"debug\".to_string()),\n                (\"CARGO_TERM\".to_string(), \"color\".to_string()),\n            ],\n        );\n\n        match msg {\n            BridgeMessage::StartAgent {\n                command,\n                args,\n                cwd,\n                env,\n            } =\u003e {\n                assert_eq!(command, \"cargo\");\n                assert_eq!(args, vec![\"run\", \"--release\"]);\n                assert_eq!(cwd, Some(\"/project\".to_string()));\n                assert_eq!(\n                    env,\n                    vec![\n                        (\"RUST_LOG\".to_string(), \"debug\".to_string()),\n                        (\"CARGO_TERM\".to_string(), \"color\".to_string())\n                    ]\n                );\n            }\n            _ =\u003e panic!(\"Expected StartAgent from factory\"),\n        }\n    }\n\n    #[test]\n    fn test_start_agent_factory_minimal() {\n        let msg = BridgeMessage::start_agent(\"echo\".to_string(), vec![], None, vec![]);\n\n        match msg {\n            BridgeMessage::StartAgent {\n                command,\n                args,\n                cwd,\n                env,\n            } =\u003e {\n                assert_eq!(command, \"echo\");\n                assert!(args.is_empty());\n                assert_eq!(cwd, None);\n                assert!(env.is_empty());\n            }\n            _ =\u003e panic!(\"Expected StartAgent from factory\"),\n        }\n    }\n\n    // ========================================================================\n    // Tests using MessageBuilder from test_utils\n    // ========================================================================\n\n    #[test]\n    fn test_message_builder_acp_payload() {\n        let msg = MessageBuilder::acp_payload(json!({\"test\": \"builder\"}));\n\n        match msg {\n            BridgeMessage::AcpPayload { payload } =\u003e {\n                assert_eq!(payload, json!({\"test\": \"builder\"}));\n            }\n            _ =\u003e panic!(\"Expected AcpPayload from MessageBuilder\"),\n        }\n    }\n\n    #[test]\n    fn test_message_builder_acp_request() {\n        let msg = MessageBuilder::acp_request(\"initialize\", json!({\"protocolVersion\": \"1.0\"}));\n\n        match msg {\n            BridgeMessage::AcpPayload { payload } =\u003e {\n                assert_eq!(payload[\"method\"], \"initialize\");\n                assert_eq!(payload[\"params\"][\"protocolVersion\"], \"1.0\");\n                assert_eq!(payload[\"jsonrpc\"], \"2.0\");\n                assert!(payload[\"id\"].is_number());\n            }\n            _ =\u003e panic!(\"Expected AcpPayload from MessageBuilder::acp_request\"),\n        }\n    }\n\n    #[test]\n    fn test_message_builder_bridge_status() {\n        let msg = MessageBuilder::bridge_status(BridgeStatus::Starting);\n\n        match msg {\n            BridgeMessage::BridgeStatus { status } =\u003e {\n                assert_eq!(status, BridgeStatus::Starting);\n            }\n            _ =\u003e panic!(\"Expected BridgeStatus from MessageBuilder\"),\n        }\n    }\n\n    #[test]\n    fn test_message_builder_stderr() {\n        let msg = MessageBuilder::stderr(\"Builder error\");\n\n        match msg {\n            BridgeMessage::Stderr { line } =\u003e {\n                assert_eq!(line, \"Builder error\");\n            }\n            _ =\u003e panic!(\"Expected Stderr from MessageBuilder\"),\n        }\n    }\n\n    #[test]\n    fn test_message_builder_process_exit_with_params() {\n        let msg = MessageBuilder::process_exit(Some(1), Some(\"SIGTERM\"));\n\n        match msg {\n            BridgeMessage::ProcessExit { code, signal } =\u003e {\n                assert_eq!(code, Some(1));\n                assert_eq!(signal, Some(\"SIGTERM\".to_string()));\n            }\n            _ =\u003e panic!(\"Expected ProcessExit from MessageBuilder\"),\n        }\n    }\n\n    #[test]\n    fn test_message_builder_process_exit_without_params() {\n        let msg = MessageBuilder::process_exit(None, None);\n\n        match msg {\n            BridgeMessage::ProcessExit { code, signal } =\u003e {\n                assert_eq!(code, None);\n                assert_eq!(signal, None);\n            }\n            _ =\u003e panic!(\"Expected ProcessExit from MessageBuilder\"),\n        }\n    }\n\n    #[test]\n    fn test_message_builder_replay_metadata_with_description() {\n        let msg = MessageBuilder::replay_metadata(3333333333, 400, Some(\"Builder session\"));\n\n        match msg {\n            BridgeMessage::ReplayMetadata {\n                captured_at_ms,\n                total_envelopes,\n                description,\n            } =\u003e {\n                assert_eq!(captured_at_ms, 3333333333);\n                assert_eq!(total_envelopes, 400);\n                assert_eq!(description, Some(\"Builder session\".to_string()));\n            }\n            _ =\u003e panic!(\"Expected ReplayMetadata from MessageBuilder\"),\n        }\n    }\n\n    #[test]\n    fn test_message_builder_replay_metadata_without_description() {\n        let msg = MessageBuilder::replay_metadata(4444444444, 500, None);\n\n        match msg {\n            BridgeMessage::ReplayMetadata {\n                captured_at_ms,\n                total_envelopes,\n                description,\n            } =\u003e {\n                assert_eq!(captured_at_ms, 4444444444);\n                assert_eq!(total_envelopes, 500);\n                assert_eq!(description, None);\n            }\n            _ =\u003e panic!(\"Expected ReplayMetadata from MessageBuilder\"),\n        }\n    }\n\n    #[test]\n    fn test_message_builder_start_agent_full() {\n        let msg = MessageBuilder::start_agent(\n            \"npm\",\n            vec![\"start\", \"--watch\"],\n            Some(\"/app\"),\n            vec![(\"NODE_ENV\", \"development\")],\n        );\n\n        match msg {\n            BridgeMessage::StartAgent {\n                command,\n                args,\n                cwd,\n                env,\n            } =\u003e {\n                assert_eq!(command, \"npm\");\n                assert_eq!(args, vec![\"start\", \"--watch\"]);\n                assert_eq!(cwd, Some(\"/app\".to_string()));\n                assert_eq!(\n                    env,\n                    vec![(\"NODE_ENV\".to_string(), \"development\".to_string())]\n                );\n            }\n            _ =\u003e panic!(\"Expected StartAgent from MessageBuilder\"),\n        }\n    }\n\n    #[test]\n    fn test_message_builder_start_agent_minimal() {\n        let msg = MessageBuilder::start_agent(\"ls\", vec![], None, vec![]);\n\n        match msg {\n            BridgeMessage::StartAgent {\n                command,\n                args,\n                cwd,\n                env,\n            } =\u003e {\n                assert_eq!(command, \"ls\");\n                assert!(args.is_empty());\n                assert_eq!(cwd, None);\n                assert!(env.is_empty());\n            }\n            _ =\u003e panic!(\"Expected StartAgent from MessageBuilder\"),\n        }\n    }\n\n    // ========================================================================\n    // Tests for BridgeStatus enum variants\n    // ========================================================================\n\n    #[test]\n    fn test_bridge_status_starting() {\n        let status = BridgeStatus::Starting;\n        assert_eq!(status, BridgeStatus::Starting);\n    }\n\n    #[test]\n    fn test_bridge_status_connected() {\n        let status = BridgeStatus::Connected;\n        assert_eq!(status, BridgeStatus::Connected);\n    }\n\n    #[test]\n    fn test_bridge_status_disconnected() {\n        let status = BridgeStatus::Disconnected;\n        assert_eq!(status, BridgeStatus::Disconnected);\n    }\n\n    #[test]\n    fn test_bridge_status_reconnecting() {\n        let status = BridgeStatus::Reconnecting;\n        assert_eq!(status, BridgeStatus::Reconnecting);\n    }\n\n    #[test]\n    fn test_bridge_status_error_equality() {\n        let status1 = BridgeStatus::Error;\n        let status2 = BridgeStatus::Error;\n        assert_eq!(status1, status2);\n    }\n\n    #[test]\n    fn test_bridge_status_not_equal_different_variants() {\n        assert_ne!(BridgeStatus::Starting, BridgeStatus::Connected);\n        assert_ne!(BridgeStatus::Connected, BridgeStatus::Disconnected);\n        assert_ne!(BridgeStatus::Disconnected, BridgeStatus::Reconnecting);\n        assert_ne!(BridgeStatus::Reconnecting, BridgeStatus::Error);\n    }\n\n    #[test]\n    fn test_bridge_status_clone() {\n        let status = BridgeStatus::Connected;\n        let cloned = status.clone();\n        assert_eq!(status, cloned);\n    }\n\n    #[test]\n    fn test_bridge_status_debug() {\n        let status = BridgeStatus::Reconnecting;\n        let debug_str = format!(\"{:?}\", status);\n        assert!(debug_str.contains(\"Reconnecting\"));\n    }\n\n    // ========================================================================\n    // Tests for serialization/deserialization\n    // ========================================================================\n\n    #[test]\n    fn test_serialization_acp_payload() {\n        let msg = BridgeMessage::acp_payload(json!({\"method\": \"test\"}));\n        let json = serde_json::to_string(\u0026msg).expect(\"Failed to serialize\");\n\n        assert!(json.contains(\"\\\"type\\\":\\\"acp_payload\\\"\"));\n        assert!(json.contains(\"\\\"method\\\":\\\"test\\\"\"));\n    }\n\n    #[test]\n    fn test_serialization_bridge_status_starting() {\n        let msg = BridgeMessage::bridge_status(BridgeStatus::Starting);\n        let json = serde_json::to_string(\u0026msg).expect(\"Failed to serialize\");\n\n        assert!(json.contains(\"\\\"type\\\":\\\"bridge_status\\\"\"));\n        assert!(json.contains(\"\\\"status\\\":\\\"starting\\\"\"));\n    }\n\n    #[test]\n    fn test_serialization_bridge_status_connected() {\n        let msg = BridgeMessage::bridge_status(BridgeStatus::Connected);\n        let json = serde_json::to_string(\u0026msg).expect(\"Failed to serialize\");\n\n        assert!(json.contains(\"\\\"status\\\":\\\"connected\\\"\"));\n    }\n\n    #[test]\n    fn test_serialization_bridge_status_disconnected() {\n        let msg = BridgeMessage::bridge_status(BridgeStatus::Disconnected);\n        let json = serde_json::to_string(\u0026msg).expect(\"Failed to serialize\");\n\n        assert!(json.contains(\"\\\"status\\\":\\\"disconnected\\\"\"));\n    }\n\n    #[test]\n    fn test_serialization_bridge_status_reconnecting() {\n        let msg = BridgeMessage::bridge_status(BridgeStatus::Reconnecting);\n        let json = serde_json::to_string(\u0026msg).expect(\"Failed to se
