!\n//! This library provides a WebSocket-based bridge between Rust and TypeScript for\n//! real-time communication in the ACP Chat system. It defines versioned envelope formats\n//! for all bridge-to-browser messages and provides a generic WebSocket server for\n//! managing bridge connections.\n//!\n//! ## Modules\n//!\n//! - [`contract`]: Versioned envelope types and message formats\n//! - [`server`]: Generic WebSocket server for bridge connections\n//!\n//! ## Exports\n//!\n//! The library re-exports all public types from its modules:\n//!\n//! ### From contract module:\n//! - [`BridgeEnvelope`]: Versioned envelope for all bridge-to-browser messages\n//! - [`BridgeMessage`]: Message variants for bridge communications\n//! - [`BridgeStatus`]: Bridge lifecycle states\n//! - [`UnsupportedVersionError`]: Error for unsupported envelope versions\n//! - [`ENVELOPE_VERSION`]: Current supported envelope version\n//! - [`SUPPORTED_VERSIONS`]: Supported envelope versions for negotiation\n//!\n//! ### From server module:\n//! - [`ServerConfig`]: Server configuration\n//! - [`run_server`]: Start the WebSocket server\n//! - [`SessionState`]: Session state tracking\n//! - [`InitMessage`]: Init message structure from client\n//! - [`DisconnectMessage`]: Disconnect message structure from client\n\npub mod contract;\npub mod server;\npub mod test_utils;\n\npub use contract::{\n    BridgeEnvelope, BridgeMessage, BridgeStatus, UnsupportedVersionError, ENVELOPE_VERSION,\n    SUPPORTED_VERSIONS,\n};\npub use server::{ServerConfig, run_server, SessionState, InitMessage, DisconnectMessage};\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","blake","Documents","software","acp-react-chat-ui","crates","acp-ws-bridge","src","server","mod.rs"],"content":"//! Generic WebSocket server for bridge connections.\n//!\n//! This module provides core WebSocket server functionality:\n//! - Connection handling and lifecycle management\n//! - Message routing\n//! - Envelope parsing\n//! - Session state tracking\n\nuse std::net::SocketAddr;\nuse tokio::net::TcpListener;\nuse tokio::sync::broadcast;\nuse futures_util::{SinkExt, StreamExt};\n\n/// Session state tracks initialization progress\n#[derive(Debug, Clone, PartialEq)]\npub enum SessionState {\n    Uninitialized,\n    Initialized,\n}\n\n/// Init message structure from client\n#[derive(Debug, serde::Deserialize)]\npub struct InitMessage {\n    #[serde(default)]\n    pub mode: Option\u003cString\u003e,\n    #[serde(default, rename = \"initId\")]\n    pub init_id: Option\u003cString\u003e,\n}\n\n/// Disconnect message structure from client\n#[derive(Debug, serde::Deserialize)]\n#[serde(tag = \"type\", rename = \"disconnect\")]\npub struct DisconnectMessage {\n    // No additional fields - just type: \"disconnect\"\n}\n\n/// Server configuration\npub struct ServerConfig {\n    pub addr: SocketAddr,\n}\n\n/// Start the WebSocket server\npub async fn run_server(config: ServerConfig) -\u003e Result\u003c(), Box\u003cdyn std::error::Error + Send + Sync\u003e\u003e {\n    let listener = TcpListener::bind(\u0026config.addr).await?;\n    tracing::info!(\"WebSocket server listening on {}\", config.addr);\n\n    let (shutdown_tx, _) = broadcast::channel::\u003c()\u003e(1);\n\n    loop {\n        let (stream, addr) = listener.accept().await?;\n        tracing::info!(\"Client connected from {}\", addr);\n        tracing::trace!(\"WebSocket connection established from {:?}\", addr);\n\n        let ws_stream = tokio_tungstenite::accept_async(stream).await?;\n        tracing::info!(\"WebSocket handshake completed for {}\", addr);\n        tracing::trace!(\"WebSocket handshake completed for {:?}\", addr);\n\n        let shutdown_rx = shutdown_tx.subscribe();\n        let shutdown_tx = shutdown_tx.clone();\n\n        tokio::spawn(async move {\n            let result = run_client_session(ws_stream, shutdown_rx, shutdown_tx).await;\n\n            if let Err(e) = result {\n                tracing::error!(\"WebSocket error for {}: {}\", addr, e);\n            }\n\n            tracing::info!(\"Client {} disconnected\", addr);\n            tracing::trace!(\"WebSocket connection closed for {:?}\", addr);\n        });\n    }\n}\n\nasync fn run_client_session(\n    ws_stream: tokio_tungstenite::WebSocketStream\u003ctokio::net::TcpStream\u003e,\n    mut shutdown_rx: broadcast::Receiver\u003c()\u003e,\n    _shutdown_tx: broadcast::Sender\u003c()\u003e,\n) -\u003e Result\u003c(), Box\u003cdyn std::error::Error + Send + Sync\u003e\u003e {\n    let (mut ws_tx, mut ws_rx) = ws_stream.split();\n    \n    loop {\n        // Wait for init message\n        let state = wait_for_init(\u0026mut ws_tx, \u0026mut ws_rx, \u0026mut shutdown_rx).await?;\n\n        match state {\n            SessionState::Initialized =\u003e {\n                // Wait for messages or disconnect\n                match wait_for_messages(\u0026mut ws_tx, \u0026mut ws_rx, \u0026mut shutdown_rx).await {\n                    Ok(_reason) =\u003e {\n                        tracing::info!(\"Session ended, waiting for new init\");\n                        tracing::trace!(\"Session ended, waiting for new init\");\n                        // Reunite stream for next iteration\n                        match ws_tx.reunite(ws_rx) {\n                            Ok(stream) =\u003e {\n                                let (new_tx, new_rx) = stream.split();\n                                ws_tx = new_tx;\n                                ws_rx = new_rx;\n                            }\n                            Err(_e) =\u003e {\n                                tracing::error!(\"Failed to reunite ws stream: stream lost\");\n                                return Ok(());\n                            }\n                        }\n                        continue;\n                    }\n                    Err(e) =\u003e return Err(e),\n                }\n            }\n            SessionState::Uninitialized =\u003e {\n                // Connection closed or error, exit loop\n                break;\n            }\n        }\n    }\n\n    Ok(())\n}\n\nasync fn wait_for_init(\n    ws_tx: \u0026mut futures_util::stream::SplitSink\u003c\n        tokio_tungstenite::WebSocketStream\u003ctokio::net::TcpStream\u003e,\n        tokio_tungstenite::tungstenite::Message,\n    \u003e,\n    ws_rx: \u0026mut futures_util::stream::SplitStream\u003ctokio_tungstenite::WebSocketStream\u003ctokio::net::TcpStream\u003e\u003e,\n    shutdown_rx: \u0026mut broadcast::Receiver\u003c()\u003e,\n) -\u003e Result\u003cSessionState, Box\u003cdyn std::error::Error + Send + Sync\u003e\u003e {\n    loop {\n        tokio::select! {\n            msg = ws_rx.next() =\u003e {\n                match msg {\n                    Some(Ok(tokio_tungstenite::tungstenite::Message::Text(text))) =\u003e {\n                        tracing::trace!(\"Message received during init: {}\", text);\n                        match serde_json::from_str::\u003cInitMessage\u003e(\u0026text) {\n                            Ok(_init_msg) =\u003e {\n                                // Send success response\n                                let success_response = serde_json::json!({\n                                    \"type\": \"init\",\n                                    \"initId\": _init_msg.init_id,\n                                    \"status\": \"success\"\n                                });\n                                tracing::trace!(\"Sending init success response\");\n                                ws_tx.send(tokio_tungstenite::tungstenite::Message::Text(\n                                    serde_json::to_string(\u0026success_response)?.into()\n                                )).await?;\n                                ws_tx.flush().await?;\n                                \n                                tracing::info!(\"Client initialized\");\n                                return Ok(SessionState::Initialized);\n                            }\n    }\n                    _ =\u003e {}\n                }\n            }\n            _ = shutdown_rx.recv() =\u003e {\n                tracing::info!(\"Shutdown signal received\");\n                return Ok(DisconnectReason::ServerShutdown);\n            }\n        }\n    }\n}\n\n/// Reason for disconnect/session end\n#[derive(Debug, Clone, PartialEq)]\nenum DisconnectReason {\n    ClientRequested,\n    ClientClosed,\n    ServerShutdown,\n}\n","traces":[{"line":43,"address":[4585567,4585715,4587082,4585312,4585596,4585389,4585503,4585546],"length":1,"stats":{"Line":0}},{"line":44,"address":[4585749,4586999,4585533,4585651,4585493],"length":1,"stats":{"Line":0}},{"line":45,"address":[4586277,4586572,4586194],"length":1,"stats":{"Line":0}},{"line":47,"address":[4586878,4586542],"length":1,"stats":{"Line":0}},{"line":49,"address":[4589378],"length":1,"stats":{"Line":0}},{"line":50,"address":[4587096,4589399,4591306,4589449,4585554,4586957],"length":1,"stats":{"Line":0}},{"line":51,"address":[4590367,4590120,4590040],"length":1,"stats":{"Line":0}},{"line":52,"address":[4590648,4590343,4590957],"length":1,"stats":{"Line":0}},{"line":54,"address":[4587126,4590879,4591248,4587411,4591401,4587153,4585575],"length":1,"stats":{"Line":0}},{"line":55,"address":[4587701,4588069,4587777],"length":1,"stats":{"Line":0}},{"line":56,"address":[4588042,4588377,4588680],"length":1,"stats":{"Line":0}},{"line":58,"address":[4588650,4589040],"length":1,"stats":{"Line":0}},{"line":59,"address":[4589064,4589129],"length":1,"stats":{"Line":0}},{"line":61,"address":[4589137,4591679,4591818,4591866,4591994,4593018,4591648],"length":1,"stats":{"Line":0}},{"line":62,"address":[4591764,4591924,4591848,4592028],"length":1,"stats":{"Line":0}},{"line":64,"address":[4592206],"length":1,"stats":{"Line":0}},{"line":65,"address":[4592379,4592666,4592269],"length":1,"stats":{"Line":0}},{"line":68,"address":[4592297,4593031,4593278],"length":1,"stats":{"Line":0}},{"line":69,"address":[4593559,4593254,45  serde_json::json;\n\n/// Builder pattern for creating test BridgeEnvelope instances.\npub struct EnvelopeBuilder {\n    version: u32,\n    seq: u64,\n    timestamp_ms: u64,\n    extra_data: Option\u003cserde_json::Value\u003e,\n    message: Option\u003cBridgeMessage\u003e,\n}\n\nimpl Default for EnvelopeBuilder {\n    fn default() -\u003e Self {\n        Self {\n            version: ENVELOPE_VERSION,\n            seq: 0,\n            timestamp_ms: 1234567890,\n            extra_data: None,\n            message: None,\n        }\n    }\n}\n\nimpl EnvelopeBuilder {\n    /// Creates a new builder with default values.\n    pub fn new() -\u003e Self {\n        Self::default()\n    }\n\n    /// Sets the envelope version.\n    pub fn version(mut self, version: u32) -\u003e Self {\n        self.version = version;\n        self\n    }\n\n    /// Sets the sequence number.\n    pub fn seq(mut self, seq: u64) -\u003e Self {\n        self.seq = seq;\n        self\n    }\n\n    /// Sets the timestamp in milliseconds.\n    pub fn timestamp_ms(mut self, timestamp_ms: u64) -\u003e Self {\n        self.timestamp_ms = timestamp_ms;\n        self\n    }\n\n    /// Sets extra data metadata.\n    pub fn extra_data(mut self, extra_data: serde_json::Value) -\u003e Self {\n        self.extra_data = Some(extra_data);\n        self\n    }\n\n    /// Sets the message payload.\n    pub fn message(mut self, message: BridgeMessage) -\u003e Self {\n        self.message = Some(message);\n        self\n    }\n\n    /// Builds the BridgeEnvelope.\n    pub fn build(self) -\u003e BridgeEnvelope {\n        BridgeEnvelope {\n            version: self.version,\n            seq: self.seq,\n            timestamp_ms: self.timestamp_ms,\n            extra_data: self.extra_data,\n            message: self.message.expect(\"message must be set\"),\n        }\n    }\n}\n\n/// Helper functions for creating test messages.\npub struct MessageBuilder;\n\nimpl MessageBuilder {\n    /// Creates an ACP payload message.\n    pub fn acp_payload(payload: serde_json::Value) -\u003e BridgeMessage {\n        BridgeMessage::AcpPayload { payload }\n    }\n\n    /// Creates an ACP payload message with a JSON-RPC request.\n    pub fn acp_request(method: \u0026str, params: serde_json::Value) -\u003e BridgeMessage {\n        BridgeMessage::AcpPayload {\n            payload: json!({\n                \"jsonrpc\": \"2.0\",\n                \"id\": 1,\n                \"method\": method,\n                \"params\": params\n            }),\n        }\n    }\n\n    /// Creates a bridge status message.\n    pub fn bridge_status(status: BridgeStatus) -\u003e BridgeMessage {\n        BridgeMessage::BridgeStatus { status }\n    }\n\n    /// Creates a stderr message.\n    pub fn stderr(line: \u0026str) -\u003e BridgeMessage {\n        BridgeMessage::Stderr {\n            line: line.to_string(),\n        }\n    }\n\n    /// Creates a process exit message.\n    pub fn process_exit(code: Option\u003ci32\u003e, signal: Option\u003c\u0026str\u003e) -\u003e BridgeMessage {\n        BridgeMessage::ProcessExit {\n            code,\n            signal: signal.map(|s| s.to_string()),\n        }\n    }\n\n    /// Creates a replay metadata message.\n    pub fn replay_metadata(\n        captured_at_ms: u64,\n        total_envelopes: u64,\n        description: Option\u003c\u0026str\u003e,\n    ) -\u003e BridgeMessage {\n        BridgeMessage::ReplayMetadata {\n            captured_at_ms,\n            total_envelopes,\n            description: description.map(|s| s.to_string()),\n        }\n    }\n\n    /// Creates a start agent message.\n    pub fn start_agent(\n        command: \u0026str,\n        args: Vec\u003c\u0026str\u003e,\n        cwd: Option\u003c\u0026str\u003e,\n        env: Vec\u003c(\u0026str, \u0026str)\u003e,\n    ) -\u003e BridgeMessage {\n        BridgeMessage::StartAgent {\n            command: command.to_string(),\n            args: args.into_iter().map(|s| s.to_string()).collect(),\n            cwd: cwd.map(|s| s.to_string()),\n            env: env\n                .into_iter()\n                .map(|(k, v)| (k.to_string(), v.to_string()))\n                .collect(),\n        }\n    }\n}\n\n/// Common test data constants.\npub mod constants {\n    use super::*;\n\n    /// Default test timestamp.\n    pub const DEFAULT_TIMESTAMP_MS: u64 = 1234567890;\n\n    /// Default test sequence number.\n    pub const DEFAULT_SEQ: u64 = 0;\n\n    /// Sample ACP payload for testing.\n    pub fn sample_acp_payload() -\u003e serde_json::Value {\n        json!({\n            \"jsonrpc\": \"2.0\",\n            \"id\": 1,\n            \"method\": \"test/method\",\n            \"params\": {\"test\": \"value\"}\n        })\n    }\n\n    /// Sample stderr line for testing.\n    pub fn sample_stderr_line() -\u003e \u0026'static str {\n        \"Error: Something went wrong\"\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_envelope_builder_default() {\n        let envelope = EnvelopeBuilder::new()\n            .message(MessageBuilder::acp_payload(json!({})))\n            .build();\n\n        assert_eq!(envelope.version, ENVELOPE_VERSION);\n        assert_eq!(envelope.seq, 0);\n        assert_eq!(envelope.timestamp_ms, 1234567890);\n        assert!(envelope.extra_data.is_none());\n    }\n\n    #[test]\n    fn test_envelope_builder_custom() {\n        let envelope = EnvelopeBuilder::new()\n            .version(2)\n            .seq(100)\n            .timestamp_ms(9_876_543_210u64)\n            .extra_data(json!({\"replaySpeed\": 2.0}))\n            .message(MessageBuilder::acp_payload(json!({})))\n            .build();\n\n        assert_eq!(envelope.version, 2);\n        assert_eq!(envelope.seq, 100);\n        assert_eq!(envelope.timestamp_ms, 9_876_543_210);\n        assert_eq!(envelope.extra_data, Some(json!({\"replaySpeed\": 2.0})));\n    }\n\n    #[test]\n    fn test_message_builder_acp_payload() {\n        let msg = MessageBuilder::acp_payload(json!({\"test\": \"value\"}));\n\n        match msg {\n            BridgeMessage::AcpPayload { payload } =\u003e {\n                assert_eq!(payload, json!({\"test\": \"value\"}));\n            }\n            _ =\u003e panic!(\"Expected AcpPayload\"),\n        }\n    }\n\n    #[test]\n    fn test_message_builder_bridge_status() {\n        let msg = MessageBuilder::bridge_status(BridgeStatus::Connected);\n\n        match msg {\n            BridgeMessage::BridgeStatus { status } =\u003e {\n                assert_eq!(status, BridgeStatus::Connected);\n            }\n            _ =\u003e panic!(\"Expected BridgeStatus\"),\n        }\n    }\n\n    #[test]\n    fn test_message_builder_stderr() {\n        let msg = MessageBuilder::stderr(\"test error\");\n\n        match msg {\n            BridgeMessage::Stderr { line } =\u003e {\n                assert_eq!(line, \"test error\");\n            }\n            _ =\u003e panic!(\"Expected Stderr\"),\n        }\n    }\n\n    #[test]\n    fn test_message_builder_process_exit() {\n        let msg = MessageBuilder::process_exit(Some(1), Some(\"SIGTERM\"));\n\n        match msg {\n            BridgeMessage::ProcessExit { code, signal } =\u003e {\n                assert_eq!(code, Some(1));\n                assert_eq!(signal, Some(\"SIGTERM\".to_string()));\n            }\n            _ =\u003e panic!(\"Expected ProcessExit\"),\n        }\n    }\n\n    #[test]\n    fn test_message_builder_replay_metadata() {\n        let msg = MessageBuilder::replay_metadata(1234567890, 100, Some(\"Test session\"));\n\n        match msg {\n            BridgeMessage::ReplayMetadata {\n                captured_at_ms,\n                total_envelopes,\n                description,\n            } =\u003e {\n                assert_eq!(captured_at_ms, 1234567890);\n                assert_eq!(total_envelopes, 100);\n                assert_eq!(description, Some(\"Test session\".to_string()));\n            }\n            _ =\u003e panic!(\"Expected ReplayMetadata\"),\n        }\n    }\n\n    #[test]\n    fn test_message_builder_start_agent() {\n        let msg = MessageBuilder::start_agent(\n            \"node\",\n            vec![\"script.js\"],\n            Some(\"/workspace\"),\n            vec![(\"NODE_ENV\", \"test\")],\n        );\n\n        match msg {\n            BridgeMessage::StartAgent {\n                command,\n                args,\n                cwd,\n                env,\n            } =\u003e {\n                assert_eq!(command, \"node\");\n                assert_eq!(args, vec![\"script.js\"]);\n                assert_eq!(cwd, Some(\"/workspace\".to_string()));\n                assert_eq!(env, vec![(\"NODE_ENV\".to_string(), \"test\".to_string())]);\n            }\n            _ =\u003e panic!(\"Expected StartAgent\"),\n        }\n    }\n}\n","traces":[{"line":16,"address":[4826496],"length":1,"stats":{"Line":2}},{"line":29,"address":[4825760],"length":1,"stats":{"Line":1}},{"line":30,"address":[4825768],"length":1,"stats":{"Line":2}},{"line":34,"address":[4826448],"length":1,"stats":{"Line":1}},{"line":35,"address":[4826464],"length":1,"stats":{"Line":1}},{"line":36,"address":[4826470],"length":1,"stats":{"Line":1}},{"line":40,"address":[4825792],"length":1,"stats":{"Line":1}},{"line":41,"address":[4825809],"length":1,"stats":{"Line":1}},{"line":42,"address":[4825816],"length":1,"stats":{"Line":1}},{"line":46,"address":[4825712],"length":1,"stats":{"Line":1}},{"line":47,"address":[4825729],"length":1,"stats":{"Line":1}},{"line":48,"address":[4825736],"length":1,"stats":{"Line":1}},{"line":52,"address":[4825520,4825691],"length":1,"stats":{"Line":1}},{"line":53,"address":[4825547,4825635],"length":1,"stats":{"Line":2}},{"line":54,"address":[4825671],"length":1,"stats":{"Line":1}},{"line":58,"address":[4826192,4826422],"length":1,"stats":{"Line":1}},{"line":59,"address":[4826374,4826222],"length":1,"stats":{"Line":2}},{"line":60,"address":[4826399],"length":1,"stats":{"Line":1}},{"line":64,"a
